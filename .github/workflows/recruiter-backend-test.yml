name: Recruiter Backend Tests

on:
  push:
    branches: [ "main", "dev", "master" ]
  pull_request:
    branches: [ "main", "dev", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./goHire/recruiter/backend

    strategy:
      matrix:
        node-version: [18.x, 20.x]
        mongodb-version: ['6.0']

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.10.0
      with:
        mongodb-version: ${{ matrix.mongodb-version }}

    - name: Install dependencies
      run: npm ci || npm install

    - name: Run tests
      run: npm test
      env:
        CI: true
        NODE_ENV: test
        JWT_SECRET: test_secret_key_for_jwt
        SESSION_SECRET: test_session_secret
        MONGO_URI_RECRUITER: mongodb://127.0.0.1:27017/recruiter_db_test
        MONGO_URI_APPLICANT: mongodb://127.0.0.1:27017/applicant_db_test
