name: Recruiter Frontend CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'goHire/recruiter/frontend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'goHire/recruiter/frontend/**'

defaults:
  run:
    working-directory: goHire/recruiter/frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: goHire/recruiter/frontend/package-lock.json
    - name: Install dependencies
      run: npm install
    - name: Build
      run: npm run build
    - name: Run tests (if present)
      run: npm test --if-present