name: Recruiter Backend CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'goHire/recruiter/backend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'goHire/recruiter/backend/**'

defaults:
  run:
    working-directory: goHire/recruiter/backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: goHire/recruiter/backend/package-lock.json
    - name: Install dependencies
      run: npm install
    - name: Run tests (if present)
      run: npm test --if-present